services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: slipgate
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    # env_file loads ALL vars from .env so new TMN_WEBHOOK_*_INBOUND /
    # _OUTBOUND keys (and any future ones) flow through without needing to
    # enumerate them below. environment: still wins for explicit overrides.
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/slipgate}
      AUTH_SECRET: ${AUTH_SECRET:-dev-secret-please-change}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      SLIP_OCR_MODEL: ${SLIP_OCR_MODEL:-anthropic/claude-haiku-4-5}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    ports:
      - "3000:3000"

volumes:
  pgdata:
